<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Ohana Lifestyle - Moda Feminina</title>
    <meta name="description" content="Ohana Lifestyle - Curadoria de moda feminina com os melhores preços via Shopee" />
    <meta name="theme-color" content="#2D5016" />
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded[0] + (decoded[1] ? '?' + decoded[1] : '') + l.hash
          );
        }
      }(window.location));
    </script>
  </head>

  <body style="background-color: #CFE0BC;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
